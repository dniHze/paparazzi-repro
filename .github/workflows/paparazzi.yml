name: Paparazzi

on:
  push:
  workflow_dispatch:

jobs:
  paparazzi:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        run: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 22
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '22'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run Paparazzi tests (run ${{ matrix.run }})
        run: ./gradlew verifyPaparazziDebug --rerun-tasks --stacktrace

      - name: Upload failure diffs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: paparazzi-failures-run-${{ matrix.run }}
          path: '**/build/paparazzi/failures/'
          if-no-files-found: ignore
